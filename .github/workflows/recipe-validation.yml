name: recipe validation

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  recipe-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install --no-audit --no-fund

      - name: Validate recipe
        run: npm run check

      - name: Write structured report
        if: always()
        run: npm run check:json > recipe-check-report.json || true

      - name: Upload recipe check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recipe-check-report
          path: recipe-check-report.json
