name: recipe validation

on:
  pull_request:
  push:

permissions:
  contents: read

jobs:
  recipe-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate recipe (always latest checker)
        run: |
          echo "Using @introspection-ai/pi-recipes@$(npm view @introspection-ai/pi-recipes version)"
          npx -y -p @introspection-ai/pi-recipes@latest recipes check . --profile ci

      - name: Write structured report
        if: always()
        run: npx -y -p @introspection-ai/pi-recipes@latest recipes check . --profile ci --json > recipe-check-report.json || true

      - name: Upload recipe check report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: recipe-check-report
          path: recipe-check-report.json
